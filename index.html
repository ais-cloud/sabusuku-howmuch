<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サブスク管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
.header { background: #fff; border-bottom: 0.5px solid #e0e0d8; padding: 1rem 1.25rem; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 500; }
.tabs { display: flex; background: #f5f5f0; border-bottom: 0.5px solid #e0e0d8; }
.tab { flex: 1; padding: 0.75rem; text-align: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
.wrap { padding: 1rem 1rem 5rem; max-width: 480px; margin: 0 auto; }
.summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
.stat { background: #fff; border-radius: 12px; padding: 0.875rem 1rem; border: 0.5px solid #e0e0d8; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; }
.stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.purpose-summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.purpose-card { border-radius: 12px; padding: 0.875rem 1rem; border: 0.5px solid; }
.purpose-card.biz { background: #EAF3DE; border-color: #C0DD97; }
.purpose-card.priv { background: #E6F1FB; border-color: #B5D4F4; }
.purpose-label { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.purpose-card.biz .purpose-label { color: #3B6D11; }
.purpose-card.priv .purpose-label { color: #185FA5; }
.purpose-amount { font-size: 18px; font-weight: 500; }
.purpose-card.biz .purpose-amount { color: #27500A; }
.purpose-card.priv .purpose-amount { color: #0C447C; }
.section-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; letter-spacing: 0.04em; }
.list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
.item-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 0.875rem 1rem; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
.item-card:active { background: #f9f9f6; }
.item-card.trial-danger { border-color: #E24B4A; background: #fff8f8; }
.item-card.trial-warn { border-color: #EF9F27; background: #fffdf5; }
.item-card.biz-card { border-left: 3px solid #639922; }
.item-card.priv-card { border-left: 3px solid #378ADD; }
.icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 3px; }
.tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; }
.tag-biz { background: #EAF3DE; color: #27500A; }
.tag-priv { background: #E6F1FB; color: #0C447C; }
.tag-cat { background: #f5f5f0; color: #555; }
.tag-year { background: #E6F1FB; color: #185FA5; }
.tag-month { background: #EAF3DE; color: #3B6D11; }
.tag-trial { background: #FAEEDA; color: #854F0B; }
.tag-danger { background: #FCEBEB; color: #A32D2D; }
.item-meta { font-size: 11px; color: #aaa; }
.trial-label { font-size: 11px; font-weight: 500; margin-top: 3px; }
.trial-label.danger { color: #A32D2D; }
.trial-label.warn { color: #854F0B; }
.trial-label.ok { color: #3B6D11; }
.item-price { text-align: right; flex-shrink: 0; }
.item-monthly { font-size: 14px; font-weight: 500; }
.item-cycle { font-size: 11px; color: #aaa; margin-top: 2px; }
.add-btn { width: 100%; padding: 0.875rem; border-radius: 10px; border: 0.5px solid #ccc; background: #fff; font-size: 14px; font-weight: 500; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.add-btn:active { background: #f5f5f0; }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ddd; background: #fff; color: #555; cursor: pointer; font-family: inherit; }
.filter-pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.alert-box { background: #fff8f8; border: 0.5px solid #E24B4A; border-radius: 12px; padding: 0.875rem 1rem; margin-bottom: 1rem; }
.alert-title { font-size: 13px; font-weight: 500; color: #A32D2D; margin-bottom: 6px; }
.alert-item { font-size: 12px; color: #A32D2D; padding: 2px 0; }
.graph-wrap { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 1rem; margin-bottom: 1rem; }
.graph-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 12px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 11px; color: #555; width: 54px; flex-shrink: 0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: #f5f5f0; border-radius: 4px; height: 20px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; min-width: 40px; }
.bar-amount { font-size: 11px; font-weight: 500; color: #fff; white-space: nowrap; }
.cat-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
/* モーダル */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 16px 16px 0 0; padding: 1.25rem 1.25rem 2.5rem; width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 1rem; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.field { margin-bottom: 0.875rem; }
.field label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
.field input, .field select { width: 100%; padding: 10px 12px; font-size: 14px; border-radius: 10px; border: 0.5px solid #ccc; background: #f9f9f6; color: #1a1a1a; font-family: inherit; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.divider { border: none; border-top: 0.5px solid #eee; margin: 1rem 0 0.875rem; }
.field-section { font-size: 12px; font-weight: 500; color: #aaa; margin-bottom: 8px; letter-spacing: 0.04em; }
/* タグ選択UI */
.tag-select { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-option { display: inline-block; font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid #ddd; background: #f9f9f6; color: #555; cursor: pointer; user-select: none; transition: all 0.15s; }
.tag-option:active { transform: scale(0.96); }
.tag-option.selected-biz { background: #EAF3DE; border-color: #639922; color: #27500A; font-weight: 500; }
.tag-option.selected-priv { background: #E6F1FB; border-color: #378ADD; color: #0C447C; font-weight: 500; }
.tag-option.selected-cat { background: #1a1a1a; border-color: #1a1a1a; color: #fff; font-weight: 500; }
.required-hint { font-size: 11px; color: #E24B4A; margin-top: 4px; display: none; }
.required-hint.show { display: block; }
/* ボタン */
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; }
.btn-cancel { background: #f5f5f0; border: none; border-radius: 10px; padding: 0.75rem; font-size: 14px; color: #555; cursor: pointer; font-family: inherit; }
.btn-save { background: #1a1a1a; border: none; border-radius: 10px; padding: 0.75rem; font-size: 14px; color: #fff; cursor: pointer; font-weight: 500; font-family: inherit; }
.del-btn { font-size: 12px; color: #c0392b; cursor: pointer; background: none; border: none; margin-top: 12px; display: block; width: 100%; text-align: center; font-family: inherit; }
.empty { text-align: center; padding: 2rem 1rem; color: #aaa; font-size: 14px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
.toggle-label { font-size: 14px; color: #1a1a1a; }
.toggle { position: relative; width: 44px; height: 26px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: #ccc; border-radius: 26px; cursor: pointer; transition: 0.3s; }
.slider:before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
input:checked + .slider { background: #1a1a1a; }
input:checked + .slider:before { transform: translateX(18px); }
/* 設定 */
.settings-section { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0d8; margin-bottom: 1rem; overflow: hidden; }
.settings-header { padding: 0.875rem 1rem; border-bottom: 0.5px solid #f0f0e8; display: flex; align-items: center; justify-content: space-between; }
.settings-header-title { font-size: 14px; font-weight: 500; }
.settings-item { padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid #f5f5f0; font-size: 14px; }
.settings-item:last-child { border-bottom: none; }
.settings-item-name { color: #1a1a1a; }
.settings-item-meta { font-size: 12px; color: #888; }
.settings-edit-btn { font-size: 12px; color: #555; background: none; border: 0.5px solid #ddd; border-radius: 6px; padding: 3px 8px; cursor: pointer; font-family: inherit; }
.add-small-btn { font-size: 13px; color: #555; background: none; border: 0.5px solid #ddd; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>

<div class="header"><h1>サブスク管理</h1></div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('list')">一覧</button>
  <button class="tab" onclick="switchTab('graph')">グラフ</button>
  <button class="tab" onclick="switchTab('settings')">設定</button>
</div>

<!-- 一覧タブ -->
<div id="tab-list" class="wrap">
  <div id="alert-area"></div>
  <div class="summary" id="summary"></div>
  <div class="purpose-summary" id="purposeSummary"></div>
  <div class="filter-row" id="filterRow"></div>
  <p class="section-title">登録サービス</p>
  <div class="list" id="list"></div>
  <button class="add-btn" onclick="openAdd()">＋ サブスクを追加</button>
</div>

<!-- グラフタブ -->
<div id="tab-graph" class="wrap" style="display:none;">
  <div class="graph-wrap"><p class="graph-title">カテゴリ別 月額内訳</p><div id="catGraph"></div><div class="cat-legend" id="catLegend"></div></div>
  <div class="graph-wrap"><p class="graph-title">支払いカード別 月額</p><div id="cardGraph"></div></div>
  <div class="graph-wrap"><p class="graph-title">事業・プライベート 内訳</p><div id="purposeGraph"></div></div>
</div>

<!-- 設定タブ -->
<div id="tab-settings" class="wrap" style="display:none;">
  <div class="settings-section">
    <div class="settings-header"><span class="settings-header-title">クレジットカード</span><button class="add-small-btn" onclick="openCardAdd()">＋ 追加</button></div>
    <div id="cardList"></div>
  </div>
  <div class="settings-section">
    <div class="settings-header"><span class="settings-header-title">カテゴリ</span><button class="add-small-btn" onclick="openCatAdd()">＋ 追加</button></div>
    <div id="catSettingsList"></div>
  </div>
</div>

<!-- サブスク追加・編集モーダル -->
<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="modalTitle">サブスクを追加</p>

    <p class="field-section">基本情報</p>
    <div class="field"><label>サービス名</label><input id="f-name" placeholder="例：Netflix" /></div>
    <div class="row2">
      <div class="field"><label>金額（円）</label><input id="f-price" type="number" placeholder="980" /></div>
      <div class="field"><label>支払いサイクル</label>
        <select id="f-cycle"><option value="monthly">月払い</option><option value="yearly">年払い</option></select>
      </div>
    </div>
    <div class="field"><label>更新日（毎月何日）</label><input id="f-day" type="number" min="1" max="31" placeholder="例：15" style="max-width:120px" /></div>

    <hr class="divider">
    <p class="field-section">用途区分 <span style="color:#E24B4A">*必須</span></p>
    <div class="tag-select" id="purposeTagSelect">
      <span class="tag-option" data-val="business" onclick="selectPurpose(this)">事業</span>
      <span class="tag-option" data-val="private" onclick="selectPurpose(this)">プライベート</span>
    </div>
    <p class="required-hint" id="purposeHint">用途区分を選んでください</p>

    <hr class="divider">
    <p class="field-section">カテゴリ（複数選択OK）</p>
    <div class="tag-select" id="catTagSelect"></div>

    <hr class="divider">
    <p class="field-section">支払いカード</p>
    <div class="field"><select id="f-card"></select></div>

    <hr class="divider">
    <p class="field-section">無料トライアル</p>
    <div class="toggle-row">
      <span class="toggle-label">無料トライアル中</span>
      <label class="toggle"><input type="checkbox" id="f-trial" onchange="toggleTrialFields()"><span class="slider"></span></label>
    </div>
    <div id="trial-fields" style="display:none;">
      <div class="field"><label>トライアル終了日</label><input id="f-trial-end" type="date" /></div>
      <div class="field"><label>解約メモ</label><input id="f-trial-note" placeholder="例：設定＞サブスクから解約" /></div>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('modal')">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存する</button>
    </div>
    <button class="del-btn" id="delBtn" onclick="deleteItem()" style="display:none;">このサービスを削除する</button>
  </div>
</div>

<!-- カード追加・編集モーダル -->
<div class="modal-bg" id="cardModal" style="display:none;">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="cardModalTitle">カードを追加</p>
    <div class="field"><label>カード名</label><input id="cf-name" placeholder="例：楽天カード" /></div>
    <div class="field"><label>種類</label>
      <select id="cf-type"><option value="visa">VISA</option><option value="master">Mastercard</option><option value="amex">AMEX</option><option value="jcb">JCB</option><option value="other">その他</option></select>
    </div>
    <div class="field"><label>メモ（末4桁など）</label><input id="cf-note" placeholder="例：末尾 1234" /></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('cardModal')">キャンセル</button>
      <button class="btn-save" onclick="saveCard()">保存する</button>
    </div>
    <button class="del-btn" id="cardDelBtn" onclick="deleteCard()" style="display:none;">このカードを削除する</button>
  </div>
</div>

<!-- カテゴリ追加・編集モーダル -->
<div class="modal-bg" id="catModal" style="display:none;">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="catModalTitle">カテゴリを追加</p>
    <div class="field"><label>カテゴリ名</label><input id="catf-name" placeholder="例：ゲーム" /></div>
    <div class="field"><label>アイコン（絵文字1文字）</label><input id="catf-icon" placeholder="例：🎮" maxlength="2" /></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('catModal')">キャンセル</button>
      <button class="btn-save" onclick="saveCat()">保存する</button>
    </div>
    <button class="del-btn" id="catDelBtn" onclick="deleteCat()" style="display:none;">このカテゴリを削除する</button>
  </div>
</div>

<script>
const KEYS = { items:'sub_items_v4', cards:'sub_cards_v1', cats:'sub_cats_v1' };
let items=[], cards=[], cats=[];
let editIdx=-1, editCardIdx=-1, editCatIdx=-1;
let filterCat='すべて', filterPurpose='all';
let selectedPurpose=null, selectedCats=[];

const DEFAULT_CATS=[{name:'動画',icon:'📺'},{name:'音楽',icon:'🎵'},{name:'仕事',icon:'💼'},{name:'学習',icon:'📚'},{name:'クラウド',icon:'☁️'},{name:'その他',icon:'📦'}];
const CAT_COLORS=['#378ADD','#7F77DD','#1D9E75','#EF9F27','#5DCAA5','#D85A30','#639922','#BA7517','#E24B4A','#888780'];
const CAT_BGS=['#E6F1FB','#EEEDFE','#EAF3DE','#FAEEDA','#E1F5EE','#FAECE7','#EAF3DE','#FAEEDA','#FCEBEB','#F1EFE8'];

function catColor(name){ const i=cats.findIndex(c=>c.name===name); return CAT_COLORS[i%CAT_COLORS.length]||'#888'; }
function catBg(name){ const i=cats.findIndex(c=>c.name===name); return CAT_BGS[i%CAT_BGS.length]||'#F1EFE8'; }
function catIcon(name){ const c=cats.find(c=>c.name===name); return c?c.icon:'📦'; }
function cardName(id){ const c=cards.find(c=>c.id===id); return c?c.name:''; }

function load(){
  try{ items=JSON.parse(localStorage.getItem(KEYS.items)||'[]'); }catch(e){ items=[]; }
  try{ cards=JSON.parse(localStorage.getItem(KEYS.cards)||'[]'); }catch(e){ cards=[]; }
  try{ const s=JSON.parse(localStorage.getItem(KEYS.cats)||'null'); cats=s||DEFAULT_CATS; }catch(e){ cats=DEFAULT_CATS; }
  // migration from v3
  ['sub_items_v3','subscriptions_v2','subscriptions_v1'].forEach(k=>{
    try{
      const o=JSON.parse(localStorage.getItem(k)||'[]');
      if(o.length&&!items.length){
        items=o.map(i=>({ ...i, cats: i.cat ? [i.cat] : [], purpose: i.purpose||'private' }));
        saveAll();
      }
    }catch(e){}
  });
}
function saveAll(){
  localStorage.setItem(KEYS.items,JSON.stringify(items));
  localStorage.setItem(KEYS.cards,JSON.stringify(cards));
  localStorage.setItem(KEYS.cats,JSON.stringify(cats));
}
function monthlyOf(item){ return item.cycle==='yearly'?Math.round(item.price/12):item.price; }
function daysUntil(d){ if(!d)return null; const t=new Date();t.setHours(0,0,0,0); const e=new Date(d);e.setHours(0,0,0,0); return Math.round((e-t)/86400000); }
function trialStatus(item){
  if(!item.trial||!item.trialEnd)return null;
  const d=daysUntil(item.trialEnd);
  if(d<0) return{label:'終了済み',cls:'ok',cardCls:''};
  if(d<=3) return{label:`あと${d}日！要確認`,cls:'danger',cardCls:'trial-danger'};
  if(d<=7) return{label:`あと${d}日`,cls:'warn',cardCls:'trial-warn'};
  return{label:`あと${d}日`,cls:'ok',cardCls:''};
}

function switchTab(t){
  ['list','graph','settings'].forEach(tab=>{ document.getElementById('tab-'+tab).style.display=t===tab?'':'none'; });
  document.querySelectorAll('.tab').forEach((el,i)=>{ el.classList.toggle('active',['list','graph','settings'][i]===t); });
  if(t==='graph') renderGraph();
  if(t==='settings') renderSettings();
}
function toggleTrialFields(){ document.getElementById('trial-fields').style.display=document.getElementById('f-trial').checked?'':'none'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

// 用途タグ選択
function selectPurpose(el){
  document.querySelectorAll('#purposeTagSelect .tag-option').forEach(t=>{ t.classList.remove('selected-biz','selected-priv'); });
  selectedPurpose=el.dataset.val;
  el.classList.add(selectedPurpose==='business'?'selected-biz':'selected-priv');
  document.getElementById('purposeHint').classList.remove('show');
}

// カテゴリタグ選択（複数）
function toggleCat(el){
  const name=el.dataset.val;
  if(selectedCats.includes(name)){
    selectedCats=selectedCats.filter(c=>c!==name);
    el.classList.remove('selected-cat');
  } else {
    selectedCats.push(name);
    el.classList.add('selected-cat');
  }
}

function buildCatTagSelect(){
  document.getElementById('catTagSelect').innerHTML=cats.map(c=>
    `<span class="tag-option ${selectedCats.includes(c.name)?'selected-cat':''}" data-val="${c.name}" onclick="toggleCat(this)">${c.icon} ${c.name}</span>`
  ).join('');
}
function buildPurposeTagSelect(){
  document.querySelectorAll('#purposeTagSelect .tag-option').forEach(el=>{
    el.classList.remove('selected-biz','selected-priv');
    if(selectedPurpose===el.dataset.val) el.classList.add(selectedPurpose==='business'?'selected-biz':'selected-priv');
  });
}
function buildCardSelect(selId){
  document.getElementById('f-card').innerHTML=`<option value="">なし</option>`+cards.map(c=>`<option value="${c.id}" ${c.id===selId?'selected':''}>${c.name}</option>`).join('');
}

function renderAlerts(){
  const urgent=items.filter(i=>{ const s=trialStatus(i); return s&&(s.cls==='danger'||s.cls==='warn'); });
  document.getElementById('alert-area').innerHTML=urgent.length?`<div class="alert-box">
    <div class="alert-title">⚠️ トライアル期限が近いサービス</div>
    ${urgent.map(i=>{const s=trialStatus(i);return`<div class="alert-item">・${i.name}　${s.label}</div>`;}).join('')}
  </div>`:'';
}
function renderFilters(){
  const allCats=['すべて',...cats.map(c=>c.name)];
  document.getElementById('filterRow').innerHTML=
    allCats.map(c=>`<button class="filter-pill ${filterCat===c&&filterPurpose==='all'?'active':''}" onclick="setFilter('${c}','all')">${c}</button>`).join('')+
    `<button class="filter-pill ${filterPurpose==='private'?'active':''}" onclick="setFilter('すべて','private')" style="border-color:#B5D4F4;color:#185FA5">プライベート</button>`+
    `<button class="filter-pill ${filterPurpose==='business'?'active':''}" onclick="setFilter('すべて','business')" style="border-color:#C0DD97;color:#3B6D11">事業</button>`;
}
function setFilter(cat,purpose){ filterCat=cat; filterPurpose=purpose; render(); }

function render(){
  renderAlerts(); renderFilters();
  const totalMonthly=items.reduce((s,i)=>s+monthlyOf(i),0);
  const totalYearly=items.reduce((s,i)=>s+(i.cycle==='yearly'?i.price:i.price*12),0);
  const trialCount=items.filter(i=>i.trial&&daysUntil(i.trialEnd)>=0).length;
  const bizMonthly=items.filter(i=>i.purpose==='business').reduce((s,i)=>s+monthlyOf(i),0);
  const privMonthly=items.filter(i=>i.purpose!=='business').reduce((s,i)=>s+monthlyOf(i),0);

  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="stat-label">月換算 合計</div><div class="stat-value">¥${totalMonthly.toLocaleString()}</div><div class="stat-sub">年間 ¥${totalYearly.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">登録数</div><div class="stat-value">${items.length}<span style="font-size:14px;font-weight:400"> 件</span></div><div class="stat-sub">${trialCount?`うちトライアル ${trialCount}件`:'　'}</div></div>`;
  document.getElementById('purposeSummary').innerHTML=`
    <div class="purpose-card biz"><div class="purpose-label">事業</div><div class="purpose-amount">¥${bizMonthly.toLocaleString()}<span style="font-size:12px;font-weight:400">/月</span></div></div>
    <div class="purpose-card priv"><div class="purpose-label">プライベート</div><div class="purpose-amount">¥${privMonthly.toLocaleString()}<span style="font-size:12px;font-weight:400">/月</span></div></div>`;

  let visible=items;
  if(filterCat!=='すべて') visible=visible.filter(i=>(i.cats||[]).includes(filterCat));
  if(filterPurpose!=='all') visible=visible.filter(i=>filterPurpose==='business'?i.purpose==='business':i.purpose!=='business');

  const list=document.getElementById('list');
  if(!visible.length){ list.innerHTML='<div class="empty">登録がありません<br>＋ボタンから追加してね</div>'; return; }

  list.innerHTML=visible.map(item=>{
    const ri=items.indexOf(item), m=monthlyOf(item), isYear=item.cycle==='yearly';
    const ts=trialStatus(item), isBiz=item.purpose==='business', cName=cardName(item.cardId);
    const itemCats=item.cats||[];
    const firstCat=itemCats[0]||'その他';
    return `<div class="item-card ${ts?ts.cardCls:''} ${isBiz?'biz-card':'priv-card'}" onclick="openEdit(${ri})">
      <div class="icon" style="background:${catBg(firstCat)}">${catIcon(firstCat)}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="tag-row">
          <span class="tag ${isBiz?'tag-biz':'tag-priv'}">${isBiz?'事業':'プライベート'}</span>
          ${itemCats.map(c=>`<span class="tag tag-cat">${catIcon(c)} ${c}</span>`).join('')}
          <span class="tag ${isYear?'tag-year':'tag-month'}">${isYear?'年払い':'月払い'}</span>
          ${item.trial?`<span class="tag ${ts&&ts.cls==='danger'?'tag-danger':'tag-trial'}">トライアル</span>`:''}
        </div>
        ${ts?`<div class="trial-label ${ts.cls}">${ts.label}</div>`:''}
        ${item.trialNote?`<div style="font-size:11px;color:#aaa;margin-top:2px">${item.trialNote}</div>`:''}
        ${cName?`<div class="item-meta">${cName}</div>`:''}
      </div>
      <div class="item-price">
        <div class="item-monthly">¥${m.toLocaleString()}<span style="font-size:11px;color:#aaa">/月</span></div>
        ${isYear?`<div class="item-cycle">年 ¥${item.price.toLocaleString()}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderGraph(){
  if(!items.length){
    ['catGraph','cardGraph','purposeGraph'].forEach(id=>{ document.getElementById(id).innerHTML='<div class="empty">データがありません</div>'; });
    document.getElementById('catLegend').innerHTML=''; return;
  }
  // カテゴリ別（複数カテゴリ対応・按分なし・全カウント）
  const catTotals={};
  items.forEach(i=>{ (i.cats||[]).forEach(c=>{ catTotals[c]=(catTotals[c]||0)+monthlyOf(i); }); });
  if(Object.keys(catTotals).length){
    const maxCat=Math.max(...Object.values(catTotals));
    document.getElementById('catGraph').innerHTML=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>
      `<div class="bar-row"><div class="bar-label">${cat.slice(0,4)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxCat*100)}%;background:${catColor(cat)}"><span class="bar-amount">¥${amt.toLocaleString()}</span></div></div></div>`
    ).join('');
    document.getElementById('catLegend').innerHTML=Object.keys(catTotals).map(cat=>
      `<div class="legend-item"><div class="legend-dot" style="background:${catColor(cat)}"></div>${cat}</div>`).join('');
  } else {
    document.getElementById('catGraph').innerHTML='<div class="empty" style="padding:1rem">カテゴリ未設定</div>';
    document.getElementById('catLegend').innerHTML='';
  }

  if(cards.length){
    const ct={}; cards.forEach(c=>{ct[c.id]=0;}); ct['none']=0;
    items.forEach(i=>{ const k=i.cardId&&ct[i.cardId]!==undefined?i.cardId:'none'; ct[k]+=monthlyOf(i); });
    const maxC=Math.max(...Object.values(ct));
    document.getElementById('cardGraph').innerHTML=Object.entries(ct).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([id,amt])=>{
      const n=id==='none'?'未設定':(cards.find(c=>c.id===id)||{name:'不明'}).name;
      return `<div class="bar-row"><div class="bar-label">${n.slice(0,5)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxC*100)}%;background:#378ADD"><span class="bar-amount">¥${amt.toLocaleString()}</span></div></div></div>`;
    }).join('');
  } else {
    document.getElementById('cardGraph').innerHTML='<div class="empty" style="padding:1rem">設定タブからカードを登録してね</div>';
  }

  const biz=items.filter(i=>i.purpose==='business').reduce((s,i)=>s+monthlyOf(i),0);
  const priv=items.filter(i=>i.purpose!=='business').reduce((s,i)=>s+monthlyOf(i),0);
  const maxP=Math.max(biz,priv)||1;
  document.getElementById('purposeGraph').innerHTML=[['事業',biz,'#639922'],['プライベート',priv,'#378ADD']].map(([label,amt,color])=>
    `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/maxP*100)}%;background:${color}"><span class="bar-amount">¥${amt.toLocaleString()}</span></div></div></div>`
  ).join('');
}

function renderSettings(){
  const cl=document.getElementById('cardList');
  cl.innerHTML=cards.length?cards.map((c,i)=>`<div class="settings-item"><div><div class="settings-item-name">${c.name}</div><div class="settings-item-meta">${c.type.toUpperCase()}${c.note?' · '+c.note:''}</div></div><button class="settings-edit-btn" onclick="openCardEdit(${i})">編集</button></div>`).join('')
    :'<div class="settings-item"><span style="color:#aaa;font-size:13px">まだカードが登録されていません</span></div>';
  document.getElementById('catSettingsList').innerHTML=cats.map((c,i)=>
    `<div class="settings-item"><div><span style="margin-right:6px">${c.icon}</span><span class="settings-item-name">${c.name}</span></div><button class="settings-edit-btn" onclick="openCatEdit(${i})">編集</button></div>`
  ).join('');
}

function openAdd(){
  editIdx=-1; selectedPurpose=null; selectedCats=[];
  document.getElementById('modalTitle').textContent='サブスクを追加';
  ['f-name','f-price','f-day','f-trial-end','f-trial-note'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('f-cycle').value='monthly';
  document.getElementById('f-trial').checked=false;
  document.getElementById('trial-fields').style.display='none';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('purposeHint').classList.remove('show');
  buildPurposeTagSelect(); buildCatTagSelect(); buildCardSelect();
  document.getElementById('modal').style.display='flex';
}
function openEdit(idx){
  editIdx=idx; const item=items[idx];
  selectedPurpose=item.purpose||'private';
  selectedCats=[...(item.cats||[])];
  document.getElementById('modalTitle').textContent='サービスを編集';
  document.getElementById('f-name').value=item.name;
  document.getElementById('f-price').value=item.price;
  document.getElementById('f-cycle').value=item.cycle;
  document.getElementById('f-day').value=item.day||'';
  document.getElementById('f-trial').checked=!!item.trial;
  document.getElementById('f-trial-end').value=item.trialEnd||'';
  document.getElementById('f-trial-note').value=item.trialNote||'';
  document.getElementById('trial-fields').style.display=item.trial?'':'none';
  document.getElementById('delBtn').style.display='block';
  document.getElementById('purposeHint').classList.remove('show');
  buildPurposeTagSelect(); buildCatTagSelect(); buildCardSelect(item.cardId);
  document.getElementById('modal').style.display='flex';
}
function saveItem(){
  const name=document.getElementById('f-name').value.trim();
  const price=parseInt(document.getElementById('f-price').value);
  if(!name||!price){ alert('サービス名と金額を入力してください'); return; }
  if(!selectedPurpose){ document.getElementById('purposeHint').classList.add('show'); return; }
  const trial=document.getElementById('f-trial').checked;
  const item={name,price,cycle:document.getElementById('f-cycle').value,cats:[...selectedCats],day:parseInt(document.getElementById('f-day').value)||null,cardId:document.getElementById('f-card').value||null,purpose:selectedPurpose,trial,trialEnd:trial?document.getElementById('f-trial-end').value:null,trialNote:trial?document.getElementById('f-trial-note').value.trim():null};
  if(editIdx>=0) items[editIdx]=item; else items.push(item);
  saveAll(); closeModal('modal'); render();
}
function deleteItem(){ if(!confirm(`「${items[editIdx].name}」を削除しますか？`))return; items.splice(editIdx,1); saveAll(); closeModal('modal'); render(); }

function openCardAdd(){
  editCardIdx=-1;
  document.getElementById('cardModalTitle').textContent='カードを追加';
  ['cf-name','cf-note'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('cf-type').value='visa';
  document.getElementById('cardDelBtn').style.display='none';
  document.getElementById('cardModal').style.display='flex';
}
function openCardEdit(idx){
  editCardIdx=idx; const c=cards[idx];
  document.getElementById('cardModalTitle').textContent='カードを編集';
  document.getElementById('cf-name').value=c.name;
  document.getElementById('cf-type').value=c.type;
  document.getElementById('cf-note').value=c.note||'';
  document.getElementById('cardDelBtn').style.display='block';
  document.getElementById('cardModal').style.display='flex';
}
function saveCard(){
  const name=document.getElementById('cf-name').value.trim();
  if(!name){ alert('カード名を入力してください'); return; }
  const card={id:editCardIdx>=0?cards[editCardIdx].id:'card_'+Date.now(),name,type:document.getElementById('cf-type').value,note:document.getElementById('cf-note').value.trim()};
  if(editCardIdx>=0) cards[editCardIdx]=card; else cards.push(card);
  saveAll(); closeModal('cardModal'); renderSettings();
}
function deleteCard(){
  if(!confirm(`「${cards[editCardIdx].name}」を削除しますか？`))return;
  const id=cards[editCardIdx].id;
  items.forEach(i=>{ if(i.cardId===id) i.cardId=null; });
  cards.splice(editCardIdx,1); saveAll(); closeModal('cardModal'); renderSettings();
}
function openCatAdd(){
  editCatIdx=-1;
  document.getElementById('catModalTitle').textContent='カテゴリを追加';
  ['catf-name','catf-icon'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('catDelBtn').style.display='none';
  document.getElementById('catModal').style.display='flex';
}
function openCatEdit(idx){
  editCatIdx=idx;
  document.getElementById('catModalTitle').textContent='カテゴリを編集';
  document.getElementById('catf-name').value=cats[idx].name;
  document.getElementById('catf-icon').value=cats[idx].icon;
  document.getElementById('catDelBtn').style.display='block';
  document.getElementById('catModal').style.display='flex';
}
function saveCat(){
  const name=document.getElementById('catf-name').value.trim();
  if(!name){ alert('カテゴリ名を入力してください'); return; }
  const cat={name,icon:document.getElementById('catf-icon').value.trim()||'📦'};
  if(editCatIdx>=0) cats[editCatIdx]=cat; else cats.push(cat);
  saveAll(); closeModal('catModal'); renderSettings(); render();
}
function deleteCat(){
  if(!confirm(`「${cats[editCatIdx].name}」を削除しますか？`))return;
  cats.splice(editCatIdx,1); saveAll(); closeModal('catModal'); renderSettings(); render();
}

load(); render();
</script>
</body>
