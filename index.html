<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サブスク管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
.header { background: #fff; border-bottom: 0.5px solid #e0e0d8; padding: 1rem 1.25rem; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; font-weight: 500; }
.tabs { display: flex; gap: 0; background: #f5f5f0; border-bottom: 0.5px solid #e0e0d8; }
.tab { flex: 1; padding: 0.75rem; text-align: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
.wrap { padding: 1rem 1rem 5rem; max-width: 480px; margin: 0 auto; }
.summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
.stat { background: #fff; border-radius: 12px; padding: 0.875rem 1rem; border: 0.5px solid #e0e0d8; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; }
.stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.section-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; letter-spacing: 0.04em; }
.list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
.item-card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 0.875rem 1rem; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.item-card:active { background: #f9f9f6; }
.item-card.trial-danger { border-color: #E24B4A; background: #fff8f8; }
.item-card.trial-warn { border-color: #EF9F27; background: #fffdf5; }
.icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-meta { font-size: 12px; color: #888; margin-top: 2px; }
.item-price { text-align: right; flex-shrink: 0; }
.item-monthly { font-size: 14px; font-weight: 500; }
.item-cycle { font-size: 11px; color: #aaa; margin-top: 2px; }
.badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; margin-left: 4px; vertical-align: middle; }
.badge-year { background: #E6F1FB; color: #185FA5; }
.badge-month { background: #EAF3DE; color: #3B6D11; }
.badge-trial { background: #FAEEDA; color: #854F0B; }
.badge-danger { background: #FCEBEB; color: #A32D2D; }
.trial-label { font-size: 11px; font-weight: 500; margin-top: 3px; }
.trial-label.danger { color: #A32D2D; }
.trial-label.warn { color: #854F0B; }
.trial-label.ok { color: #3B6D11; }
.add-btn { width: 100%; padding: 0.875rem; border-radius: 10px; border: 0.5px solid #ccc; background: #fff; font-size: 14px; font-weight: 500; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.add-btn:active { background: #f5f5f0; }
.cat-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.cat-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ddd; background: #fff; color: #555; cursor: pointer; font-family: inherit; }
.cat-pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.alert-box { background: #fff8f8; border: 0.5px solid #E24B4A; border-radius: 12px; padding: 0.875rem 1rem; margin-bottom: 1rem; }
.alert-title { font-size: 13px; font-weight: 500; color: #A32D2D; margin-bottom: 6px; }
.alert-item { font-size: 12px; color: #A32D2D; padding: 2px 0; }
.graph-wrap { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0d8; padding: 1rem; margin-bottom: 1rem; }
.graph-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 12px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 12px; color: #555; width: 32px; flex-shrink: 0; text-align: right; }
.bar-track { flex: 1; background: #f5f5f0; border-radius: 4px; height: 20px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; transition: width 0.4s ease; }
.bar-amount { font-size: 11px; font-weight: 500; color: #fff; white-space: nowrap; }
.cat-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
.modal { background: #fff; border-radius: 16px 16px 0 0; padding: 1.25rem 1.25rem 2.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 1rem; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.field { margin-bottom: 0.875rem; }
.field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
.field input, .field select { width: 100%; padding: 10px 12px; font-size: 14px; border-radius: 10px; border: 0.5px solid #ccc; background: #f9f9f6; color: #1a1a1a; font-family: inherit; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.divider { border: none; border-top: 0.5px solid #eee; margin: 1rem 0 0.875rem; }
.field-section { font-size: 12px; font-weight: 500; color: #aaa; margin-bottom: 8px; letter-spacing: 0.04em; }
.btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; }
.btn-cancel { background: #f5f5f0; border: none; border-radius: 10px; padding: 0.75rem; font-size: 14px; color: #555; cursor: pointer; font-family: inherit; }
.btn-save { background: #1a1a1a; border: none; border-radius: 10px; padding: 0.75rem; font-size: 14px; color: #fff; cursor: pointer; font-weight: 500; font-family: inherit; }
.del-btn { font-size: 12px; color: #c0392b; cursor: pointer; background: none; border: none; margin-top: 12px; display: block; width: 100%; text-align: center; font-family: inherit; }
.empty { text-align: center; padding: 2rem 1rem; color: #aaa; font-size: 14px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; }
.toggle-label { font-size: 14px; color: #1a1a1a; }
.toggle { position: relative; width: 44px; height: 26px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: #ccc; border-radius: 26px; cursor: pointer; transition: 0.3s; }
.slider:before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
input:checked + .slider { background: #1a1a1a; }
input:checked + .slider:before { transform: translateX(18px); }
</style>
</head>
<body>

<div class="header">
  <h1>サブスク管理</h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('list')">一覧</button>
  <button class="tab" onclick="switchTab('graph')">グラフ</button>
</div>

<div id="tab-list" class="wrap">
  <div id="alert-area"></div>
  <div class="summary" id="summary"></div>
  <div class="cat-bar" id="catBar"></div>
  <p class="section-title">登録サービス</p>
  <div class="list" id="list"></div>
  <button class="add-btn" onclick="openAdd()">＋ サブスクを追加</button>
</div>

<div id="tab-graph" class="wrap" style="display:none;">
  <div class="graph-wrap">
    <p class="graph-title">カテゴリ別 月額内訳</p>
    <div id="catGraph"></div>
    <div class="cat-legend" id="catLegend"></div>
  </div>
  <div class="graph-wrap">
    <p class="graph-title">サービス別 月額ランキング</p>
    <div id="serviceGraph"></div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="modalTitle">サブスクを追加</p>

    <p class="field-section">基本情報</p>
    <div class="field"><label>サービス名</label><input id="f-name" placeholder="例：Netflix" /></div>
    <div class="row2">
      <div class="field"><label>金額（円）</label><input id="f-price" type="number" placeholder="980" /></div>
      <div class="field"><label>支払いサイクル</label>
        <select id="f-cycle">
          <option value="monthly">月払い</option>
          <option value="yearly">年払い</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>カテゴリ</label>
        <select id="f-cat">
          <option value="動画">動画</option>
          <option value="音楽">音楽</option>
          <option value="仕事">仕事</option>
          <option value="学習">学習</option>
          <option value="クラウド">クラウド</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field"><label>更新日（毎月何日）</label>
        <input id="f-day" type="number" min="1" max="31" placeholder="15" />
      </div>
    </div>

    <hr class="divider">
    <p class="field-section">無料トライアル</p>
    <div class="toggle-row">
      <span class="toggle-label">無料トライアル中</span>
      <label class="toggle"><input type="checkbox" id="f-trial" onchange="toggleTrialFields()"><span class="slider"></span></label>
    </div>
    <div id="trial-fields" style="display:none;">
      <div class="field"><label>トライアル終了日</label><input id="f-trial-end" type="date" /></div>
      <div class="field"><label>メモ（例：解約方法など）</label><input id="f-trial-note" placeholder="例：設定＞サブスクから解約" /></div>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveItem()">保存する</button>
    </div>
    <button class="del-btn" id="delBtn" onclick="deleteItem()" style="display:none;">このサービスを削除する</button>
  </div>
</div>

<script>
const KEY = 'subscriptions_v2';
let items = [];
let editIdx = -1;
let filterCat = 'すべて';

const CAT_COLORS = { 動画:'#378ADD', 音楽:'#7F77DD', 仕事:'#1D9E75', 学習:'#EF9F27', クラウド:'#5DCAA5', その他:'#888780' };
const CAT_ICONS  = { 動画:'📺', 音楽:'🎵', 仕事:'💼', 学習:'📚', クラウド:'☁️', その他:'📦' };
const CAT_BG     = { 動画:'#E6F1FB', 音楽:'#EEEDFE', 仕事:'#EAF3DE', 学習:'#FAEEDA', クラウド:'#E1F5EE', その他:'#F1EFE8' };

function load() {
  try { items = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { items = []; }
  // v1 migration
  try {
    const old = JSON.parse(localStorage.getItem('subscriptions_v1') || '[]');
    if (old.length && !items.length) { items = old; save(); }
  } catch(e) {}
}
function save() { localStorage.setItem(KEY, JSON.stringify(items)); }
function monthlyOf(item) { return item.cycle === 'yearly' ? Math.round(item.price / 12) : item.price; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(dateStr); end.setHours(0,0,0,0);
  return Math.round((end - today) / 86400000);
}

function trialStatus(item) {
  if (!item.trial || !item.trialEnd) return null;
  const d = daysUntil(item.trialEnd);
  if (d < 0) return { label: '終了済み', cls: 'ok', cardCls: '' };
  if (d <= 3) return { label: `あと${d}日！要確認`, cls: 'danger', cardCls: 'trial-danger' };
  if (d <= 7) return { label: `あと${d}日`, cls: 'warn', cardCls: 'trial-warn' };
  return { label: `あと${d}日`, cls: 'ok', cardCls: '' };
}

function switchTab(t) {
  document.getElementById('tab-list').style.display = t === 'list' ? '' : 'none';
  document.getElementById('tab-graph').style.display = t === 'graph' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='list')||(i===1&&t==='graph')));
  if (t === 'graph') renderGraph();
}

function toggleTrialFields() {
  document.getElementById('trial-fields').style.display = document.getElementById('f-trial').checked ? '' : 'none';
}

function renderAlerts() {
  const urgent = items.filter(i => {
    const s = trialStatus(i);
    return s && (s.cls === 'danger' || s.cls === 'warn');
  });
  const area = document.getElementById('alert-area');
  if (!urgent.length) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="alert-box">
    <div class="alert-title">⚠️ トライアル期限が近いサービス</div>
    ${urgent.map(i => {
      const s = trialStatus(i);
      return `<div class="alert-item">・${i.name}　${s.label}</div>`;
    }).join('')}
  </div>`;
}

function render() {
  renderAlerts();
  const cats = ['すべて', ...new Set(items.map(i => i.cat))];
  document.getElementById('catBar').innerHTML = cats.map(c =>
    `<button class="cat-pill ${filterCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');

  const totalMonthly = items.reduce((s,i) => s + monthlyOf(i), 0);
  const totalYearly  = items.reduce((s,i) => s + (i.cycle==='yearly' ? i.price : i.price*12), 0);
  const trialCount   = items.filter(i => i.trial && daysUntil(i.trialEnd) >= 0).length;

  document.getElementById('summary').innerHTML = `
    <div class="stat">
      <div class="stat-label">月換算 合計</div>
      <div class="stat-value">¥${totalMonthly.toLocaleString()}</div>
      <div class="stat-sub">年間 ¥${totalYearly.toLocaleString()}</div>
    </div>
    <div class="stat">
      <div class="stat-label">登録数</div>
      <div class="stat-value">${items.length}<span style="font-size:14px;font-weight:400"> 件</span></div>
      <div class="stat-sub">${trialCount ? `うちトライアル ${trialCount}件` : '　'}</div>
    </div>`;

  const visible = filterCat === 'すべて' ? items : items.filter(i => i.cat === filterCat);
  const list = document.getElementById('list');
  if (!visible.length) { list.innerHTML = '<div class="empty">まだ登録がありません<br>＋ボタンから追加してね</div>'; return; }

  list.innerHTML = visible.map(item => {
    const realIdx = items.indexOf(item);
    const m = monthlyOf(item);
    const isYear = item.cycle === 'yearly';
    const ts = trialStatus(item);
    return `<div class="item-card ${ts ? ts.cardCls : ''}" onclick="openEdit(${realIdx})">
      <div class="icon" style="background:${CAT_BG[item.cat]||'#F1EFE8'}">${CAT_ICONS[item.cat]||'📦'}</div>
      <div class="item-info">
        <div class="item-name">${item.name}
          <span class="badge ${isYear?'badge-year':'badge-month'}">${isYear?'年払い':'月払い'}</span>
          ${item.trial ? `<span class="badge ${ts&&ts.cls==='danger'?'badge-danger':'badge-trial'}">トライアル</span>` : ''}
        </div>
        <div class="item-meta">${item.cat}${item.day ? ` · 毎月${item.day}日` : ''}</div>
        ${ts ? `<div class="trial-label ${ts.cls}">${ts.label}</div>` : ''}
        ${item.trialNote ? `<div style="font-size:11px;color:#aaa;margin-top:2px">${item.trialNote}</div>` : ''}
      </div>
      <div class="item-price">
        <div class="item-monthly">¥${m.toLocaleString()}<span style="font-size:11px;color:#aaa">/月</span></div>
        ${isYear ? `<div class="item-cycle">年 ¥${item.price.toLocaleString()}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderGraph() {
  if (!items.length) {
    document.getElementById('catGraph').innerHTML = '<div class="empty">データがありません</div>';
    document.getElementById('serviceGraph').innerHTML = '';
    return;
  }

  const catTotals = {};
  items.forEach(i => { catTotals[i.cat] = (catTotals[i.cat]||0) + monthlyOf(i); });
  const maxCat = Math.max(...Object.values(catTotals));
  document.getElementById('catGraph').innerHTML = Object.entries(catTotals)
    .sort((a,b)=>b[1]-a[1])
    .map(([cat,amt]) => {
      const pct = Math.round(amt/maxCat*100);
      const color = CAT_COLORS[cat] || '#888';
      return `<div class="bar-row">
        <div class="bar-label">${cat.slice(0,3)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color}">
            <span class="bar-amount">¥${amt.toLocaleString()}</span>
          </div>
        </div>
      </div>`;
    }).join('');

  document.getElementById('catLegend').innerHTML = Object.entries(catTotals)
    .map(([cat]) => `<div class="legend-item"><div class="legend-dot" style="background:${CAT_COLORS[cat]||'#888'}"></div>${cat}</div>`)
    .join('');

  const sorted = [...items].sort((a,b) => monthlyOf(b)-monthlyOf(a)).slice(0,8);
  const maxSvc = monthlyOf(sorted[0]);
  document.getElementById('serviceGraph').innerHTML = sorted.map(item => {
    const m = monthlyOf(item);
    const pct = Math.round(m/maxSvc*100);
    const color = CAT_COLORS[item.cat] || '#888';
    return `<div class="bar-row">
      <div class="bar-label" style="width:52px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.name.slice(0,5)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}">
          <span class="bar-amount">¥${m.toLocaleString()}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCat(c) { filterCat = c; render(); }

function openAdd() {
  editIdx = -1;
  document.getElementById('modalTitle').textContent = 'サブスクを追加';
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-cycle').value = 'monthly';
  document.getElementById('f-cat').value = 'その他';
  document.getElementById('f-day').value = '';
  document.getElementById('f-trial').checked = false;
  document.getElementById('f-trial-end').value = '';
  document.getElementById('f-trial-note').value = '';
  document.getElementById('trial-fields').style.display = 'none';
  document.getElementById('delBtn').style.display = 'none';
  document.getElementById('modal').style.display = 'flex';
}

function openEdit(idx) {
  editIdx = idx;
  const item = items[idx];
  document.getElementById('modalTitle').textContent = 'サービスを編集';
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-price').value = item.price;
  document.getElementById('f-cycle').value = item.cycle;
  document.getElementById('f-cat').value = item.cat;
  document.getElementById('f-day').value = item.day || '';
  document.getElementById('f-trial').checked = !!item.trial;
  document.getElementById('f-trial-end').value = item.trialEnd || '';
  document.getElementById('f-trial-note').value = item.trialNote || '';
  document.getElementById('trial-fields').style.display = item.trial ? '' : 'none';
  document.getElementById('delBtn').style.display = 'block';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  const price = parseInt(document.getElementById('f-price').value);
  if (!name || !price) { alert('サービス名と金額を入力してください'); return; }
  const trial = document.getElementById('f-trial').checked;
  const item = {
    name, price,
    cycle: document.getElementById('f-cycle').value,
    cat:   document.getElementById('f-cat').value,
    day:   parseInt(document.getElementById('f-day').value) || null,
    trial,
    trialEnd:  trial ? document.getElementById('f-trial-end').value : null,
    trialNote: trial ? document.getElementById('f-trial-note').value.trim() : null,
  };
  if (editIdx >= 0) items[editIdx] = item; else items.push(item);
  save(); closeModal(); render();
}

function deleteItem() {
  if (!confirm(`「${items[editIdx].name}」を削除しますか？`)) return;
  items.splice(editIdx, 1);
  save(); closeModal(); render();
}

load(); render();
</script>
</body>
</html>
